<!DOCTYPE html>
<html>

<head>
    <title>Web Debug UI Demo Controls</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .control-panel {
            background: #1e1e1e;
            padding: 15px;
            border-bottom: 1px solid #333;
            color: white;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            height: auto;
            overflow-x: auto;
        }

        .preview-panel {
            flex: 1;
            border: none;
            overflow: hidden;
            background: #1e1e1e;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: #2d2d2d;
            color: white;
            border: 1px solid #404040;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .button:hover {
            background: #404040;
        }

        .scenario {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 0 10px;
            border-right: 1px solid #404040;
        }

        .scenario:last-child {
            border-right: none;
        }

        .scenario h3 {
            font-size: 13px;
            margin: 0;
            color: #888;
            white-space: nowrap;
        }

        .status {
            margin-left: auto;
            padding: 5px 10px;
            background: #2d2d2d;
            border-radius: 4px;
            font-size: 13px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="control-panel">
        <div class="scenario">
            <h3>Agent Interaction</h3>
            <button class="button" onclick="triggerEvent('on_start')">▶️ Start Agent</button>
            <button class="button" onclick="triggerEvent('on_message_completion')">💬 Send Message</button>
            <button class="button" onclick="triggerEvent('on_tool_execution')">🔧 Execute Tool</button>
        </div>

        <div class="scenario">
            <h3>Multi-Agent</h3>
            <button class="button" onclick="triggerEvent('on_start')">➕ Add Agent</button>
            <button class="button" onclick="triggerEvent('on_handoff')">🔄 Agent Handoff</button>
        </div>

        <div class="scenario">
            <h3>Resources</h3>
            <button class="button" onclick="triggerEvent('on_tool_execution')">💰 Update Budget</button>
            <button class="button" onclick="triggerEvent('on_tool_execution')">📈 Token Spike</button>
        </div>

        <div class="scenario">
            <h3>Errors</h3>
            <button class="button" onclick="triggerEvent('on_tool_execution')">⚠️ Tool Error</button>
            <button class="button" onclick="triggerEvent('on_message_completion')">❌ Agent Error</button>
        </div>

        <div class="scenario">
            <h3>Reset</h3>
            <button class="button" onclick="triggerEvent('reset')" style="background: #442222;">🔄 Reset Demo</button>
        </div>

        <div class="status" id="status">Status: Ready</div>
    </div>

    <div class="preview-panel">
        <iframe src="../static/index.html"></iframe>
    </div>

    <script>
        function triggerEvent(eventType) {
            const status = document.getElementById('status');
            status.textContent = `Status: Triggering ${eventType}...`;

            fetch(`/trigger/${eventType}`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    status.textContent = `Status: ${data.event} completed`;
                    setTimeout(() => {
                        status.textContent = 'Status: Ready';
                    }, 2000);
                })
                .catch(error => {
                    status.textContent = `Status: Error - ${error.message}`;
                    setTimeout(() => {
                        status.textContent = 'Status: Ready';
                    }, 2000);
                });
        }
    </script>
</body>

</html>
